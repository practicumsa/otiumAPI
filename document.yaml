openapi: 3.0.0
servers:
  - description: Otium Mock
    url: https://7cc189c1-def1-4b43-beb1-4a3d04d37ad7.mock.pstmn.io/
info:
  description: Коллекция запросов API сервиса Otium. Сервис предоставляет информацию о фильмах и сериалах, которые доступны на платформе Otium.
  version: "1.0.0"
  title: API сервиса Otium
tags:
  - name: API Фильмы
  - name: API Сериалы
  - name: API Авторизация

paths: 
  /film/list:
    get:
      tags: 
        - API Фильмы
      summary: Cписок всех фильмов на платформе
      operationId: filmsList
      description: |
        Список всех фильмов на платформе
      parameters:
        - in: query
          name: genre
          description: жанр фильма (comedy, drama, history)
          example: comedy
          required: false
          schema:
            type: string
      responses:
        '200':
          description: список фильмов
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - type
                    - title
                    - description
                    - imageUrl
                    - previewUrl
                    - recordUrl
                    - genre
                    - details
                    - language
                    - team
                    - rating
                  properties:
                    id:
                      type: string
                      description: идентификатор
                      example: 104
                    type:
                      type: string
                      description: тип контента
                      example: film
                    title:
                      type: string
                      description: название
                      example: Ребус Атлантиды
                    description:
                      type: string
                      description: короткое описание
                      example: Археолога подозревают в преступлении, которого он не совершал. Герой знакомится с историком турецкой полиции Шехер Джан, вместе они пытаются раскрыть тайну.
                    imageUrl: 
                      type: string
                      description: постер
                      format: url
                      example: https://otium.imagestorage.ru/RebusOfAtlantis.img
                    previewUrl: 
                      type: string
                      description: превью
                      format: url
                      example: https://otium.previewstorage.ru/RebusOfAtlantis.mov
                    recordUrl: 
                      type: string
                      description: url видео-файла
                      format: url
                      example: https://otium.recordstorage.ru/RebusOfAtlantis.mov
                    genre:
                      type: array
                      description: жанр
                      items: 
                        type: string
                        example: thriller, mystery
                    recommended:
                      type: boolean
                      description: рекомендованный контент
                      example: true
                    details:
                      type: object
                      required:
                          - yearOfIssue
                          - duration
                          - country
                          - ageRate
                      properties:
                          yearOfIssue:
                            type: string
                            description: год производства
                            example: 2007
                          duration:
                            type: integer
                            description: продолжительность (в минутах)
                            example: 159
                          country:
                            type: array
                            description: страна производства
                            items: 
                              type: string
                              example: Великобритания, Турция, США
                          ageRate:
                            type: string
                            description: возрастной рейтинг
                            example: 12+
                    language:
                      type: object
                      required:
                        - original
                      properties:
                          original:
                            type: array
                            description: язык оригинала
                            items:
                              type: string
                              example: английский, турецкий
                          sound:
                            type: array
                            description: язык озвучки
                            items:
                              type: string
                              example: русский, английский
                          subtitle:
                            type: array
                            description: язык субтитров
                            items:
                              type: string
                              example: русский, английский, турецкий
                    team:
                      type: object
                      required:
                        - cast
                      properties:
                        cast:
                            type: array
                            description: актёры в главной роли
                            items:
                              type: string
                              example: Джон Джэксон, Айше Болат
                        dubbingTeam:
                            type: array
                            description: актрёры озвучки
                            items: 
                              type: string
                              example: null
                    rating:
                      type: string
                      example: 7.3
        '400':
          description: bad input parameter
          
  /film:
    get:
      tags: 
        - API Фильмы
      summary: Детальное описание фильма
      operationId: filmDescription
      description: |
        Детальное описание фильма
      parameters:
        - in: query
          name: id
          description: идентификатор фильма (101, 102, 103, 104)
          required: true
          schema:
            type: integer
            example: 101
      responses:
        '200':
          description: детальное описание фильма
          content:
            application/json:
              schema:
                type: object
                required:
                    - id
                    - type
                    - title
                    - description
                    - imageUrl
                    - previewUrl
                    - recordUrl
                    - genre
                    - details
                    - language
                    - team
                    - rating
                properties:
                    id:
                      type: string
                      description: идентификатор
                      example: 104
                    type:
                      type: string
                      description: тип контента
                      example: film
                    title:
                      type: string
                      description: название
                      example: Ребус Атлантиды
                    description:
                      type: string
                      description: короткое описание
                      example: Археолога подозревают в преступлении, которого он не совершал. Герой знакомится с историком турецкой полиции Шехер Джан, вместе они пытаются раскрыть тайну.
                    imageUrl: 
                      type: string
                      description: постер
                      format: url
                      example: https://otium.imagestorage.ru/RebusOfAtlantis.img
                    previewUrl: 
                      type: string
                      description: превью
                      format: url
                      example: https://otium.previewstorage.ru/RebusOfAtlantis.mov
                    recordUrl: 
                      type: string
                      description: url видео-файла
                      format: url
                      example: https://otium.recordstorage.ru/RebusOfAtlantis.mov
                    genre:
                      type: array
                      description: жанр
                      items: 
                        type: string
                        example: thriller, mystery
                    recommended:
                      type: boolean
                      description: рекомендованный контент
                      example: true
                    details:
                      type: object
                      required:
                          - yearOfIssue
                          - duration
                          - country
                          - ageRate
                      properties:
                          yearOfIssue:
                            type: string
                            description: год производства
                            example: 2007
                          duration:
                            type: integer
                            description: продолжительность (в минутах)
                            example: 159
                          country:
                            type: array
                            description: страна производства
                            items: 
                              type: string
                              example: Великобритания, Турция, США
                          ageRate:
                            type: string
                            description: возрастной рейтинг
                            example: 12+
                    language:
                      type: object
                      required:
                        - original
                      properties:
                          original:
                            type: array
                            description: язык оригинала
                            items:
                              type: string
                              example: английский, турецкий
                          sound:
                            type: array
                            description: язык озвучки
                            items:
                              type: string
                              example: русский, английский
                          subtitle:
                            type: array
                            description: язык субтитров
                            items:
                              type: string
                              example: русский, английский, турецкий
                    team:
                      type: object
                      required:
                          - cast
                      properties:
                          cast:
                            type: array
                            description: актёры в главной роли
                            items:
                              type: string
                              example: Джон Джэксон, Айше Болат
                          dubbingTeam:
                            type: array
                            description: актрёры озвучки
                            items: 
                              type: string
                              example: null
                    rating:
                      type: string
                      example: 7.3
        '400':
          description: bad input parameter 
        '404':
          description: id doesn't match

  /series/list:
    get:
      tags: 
        - API Сериалы
      summary: Cписок всех сериалов на платформе
      operationId: seriesList
      description: |
        Список всех сериалов на платформе
      parameters:
        - in: query
          name: genre
          description: жанр сериала (kids, reality, action)
          example: reality
          required: false
          schema:
            type: string
      responses:
        '200':
          description: список сериалов
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  required:
                    - id
                    - type
                    - title
                    - description
                    - imageUrl
                    - previewUrl
                    - recordUrl
                    - genre
                    - recommended
                    - details
                  properties:
                    id:
                      type: integer
                      example: 205
                    type:
                      type: string
                      example: series
                    title:
                      type: string
                      example: Загадка города Эльдорадо
                    description:
                      type: string
                      example: Географа подозревают в написании книги, которую он не писал. Герой знакомится с журналисткой мексиканской газеты Глорией, вместе они пытаются раскрыть тайну мифиечкого города.
                    imageUrl: 
                      type: string
                      format: url
                      example: https://otium.imagestorage.ru/MysteryOfEldorado.img
                    previewUrl: 
                      type: string
                      format: url
                      example: https://otium.previewstorage.ru/MysteryOfEldorado.mov
                    recordUrl: 
                      type: string
                      format: url
                      example: https://otium.recordstorage.ru/MysteryOfEldorado.mov
                    genre:
                      type: array
                      items: 
                        type: string
                        example: action
                    recommended:
                      type: boolean
                      example: true
        '400':
          description: bad input parameters

            
  /series:
    get:
      tags: 
        - API Сериалы
      summary: Детальное описание сериала
      operationId: seriesDescription
      description: |
        Детальное описание сериала
      parameters:
        - in: query
          name: id
          description: идентификатор сериала (201, 202, 203, 204)
          example: 204
          required: true
          schema:
            type: string
      responses:
          '200':
            description: детальное описание сериала
            content:
              application/json:
                schema:
                  type: object
                  required:
                    - id
                    - type
                    - title
                    - description
                    - imageUrl
                    - previewUrl
                    - recordUrl
                    - genre
                    - recommended
                    - details
                    - language
                    - rating
                    - favorites
                  properties:
                    id:
                      type: integer
                      example: 205
                    type:
                      type: string
                      example: series
                    title:
                      type: string
                      example: Загадка города Эльдорадо
                    description:
                      type: string
                      example: Географа подозревают в написании книги, которую он не писал. Герой знакомится с журналисткой мексиканской газеты Глорией, вместе они пытаются раскрыть тайну мифиечкого города.
                    imageUrl: 
                      type: string
                      format: url
                      example: https://otium.imagestorage.ru/MysteryOfEldorado.img
                    previewUrl: 
                      type: string
                      format: url
                      example: https://otium.previewstorage.ru/MysteryOfEldorado.mov
                    recordUrl: 
                      type: string
                      format: url
                      example: https://otium.recordstorage.ru/MysteryOfEldorado.mov
                    genre:
                      type: array
                      items: 
                        type: string
                        example: action
                    recommended:
                      type: boolean
                      example: true
                    details:
                      type: object
                      required:
                          - yearOfIssue
                          - episodesCount
                          - country
                          - ageRate
                      properties:
                        yearOfIssue:
                                  type: string
                                  example: 2007
                        episodesCount:
                                  type: integer
                                  example: 12
                        country:
                                  type: array
                                  items: 
                                    type: string
                                    example: Великобритания, Турция, США
                        ageRate:
                                  type: string
                                  example: 12+
                    language:
                      type: object
                      required:
                        - original
                        - sound
                        - subtitle
                      properties:
                        original:
                          type: array
                          items:
                            type: string
                            example: английский, турецкий
                        sound:
                          type: array
                          items:
                            type: string
                            example: русский, английский
                        subtitle:
                          type: array
                          items:
                            type: string
                            example: русский, английский, турецкий
                        rating:
                          type: integer
                          example: 9.3
                        favorites:
                          type: boolean
                          example: false
          '400':
            description: bad input parameter
          '404':
            description: id doesn't match
          
  /auth:
    post:
      tags: 
        - API Авторизация
      summary: Вход в Личный кабинет
      operationId: auth
      description: |
        Вход в Личный кабинет
      requestBody:
        content:
          application/json:
            schema:
              type: object
              items:
                $ref: '#/components/schemas/auth'
      responses:
        '200':
          description: авторизация прошла успешно
          content:
            application/json:
              schema:
                type: object
                items:
                  type: string
                  example: success
        '403':
          description: вход запрещён, отсутствует логин и/или пароль
          content:
            application/json:
              schema:
                type: object
                items:
                  type: string
                  example: fail
  
  /logout:
    post:
      tags: 
        - API Авторизация
      summary: Выход из Личного кабинета
      operationId: logout
      description: |
        Выход из Личного кабинета
      responses:
        '200':
          description: успешный выход из Личного кабинета
          content:
            application/json:
              schema:
                type: object
                items:
                  type: string
                  example: success
        '403':
          description: ошибка выхода из Личного кабинета
          content:
            application/json:
              schema:
                type: object
                items:
                  type: string
                  example: fail

    
components:
  schemas:
    auth:
        type: object
        required:
          - login
          - password
        properties:
          login:
            type: string
          password:
            type: string